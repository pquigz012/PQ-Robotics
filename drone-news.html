<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlanta Drone News</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #888780;
      --accent: #185FA5;
      --accent-bg: #e6f1fb;
      --accent-text: #0c447c;
      --tag-drone-bg: #e1f5ee;
      --tag-drone-text: #0f6e56;
      --tag-show-bg: #eeedfe;
      --tag-show-text: #3c3489;
      --tag-reg-bg: #faeeda;
      --tag-reg-text: #633806;
      --radius: 10px;
      --radius-sm: 6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --surface: #252523;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);
        --text-primary: #f0ede6;
        --text-secondary: #b4b2a9;
        --text-muted: #888780;
        --accent: #378add;
        --accent-bg: #042c53;
        --accent-text: #85b7eb;
        --tag-drone-bg: #04342c;
        --tag-drone-text: #9fe1cb;
        --tag-show-bg: #26215c;
        --tag-show-text: #cecbf6;
        --tag-reg-bg: #412402;
        --tag-reg-text: #fac775;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: url('assets/images/atlanta-bg.jpg') center center / cover no-repeat fixed;
      color: #fff;
      min-height: 100vh;
      line-height: 1.6;
    }

    header, .controls, main {
      position: relative;
      z-index: 1;
    }

    .feed-panel {
      max-width: 820px;
      margin: 0 auto;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 0.75rem;
      position: relative;
      z-index: 1;
    }

    header {
      background: transparent;
      border-bottom: none;
      padding: 2rem 1.5rem 1.5rem;
      max-width: 780px;
      margin: 0 auto;
    }

    .header-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.3rem;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    .header-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .dot { opacity: 0.4; }

    .refresh-btn {
      background: var(--accent-bg);
      border: 0.5px solid var(--accent);
      border-radius: var(--radius-sm);
      color: var(--accent-text);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: var(--accent-bg); color: var(--accent-text); }

    .controls {
      max-width: 780px;
      margin: 0 auto;
      padding: 1rem 1.5rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: #fff;
      border: 0.5px solid var(--border-strong);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { font-weight: 500; }

    .filter-drone.active, .filter-drone:hover { background: var(--tag-drone-bg); color: var(--tag-drone-text); border-color: var(--tag-drone-text); }
    .filter-show.active, .filter-show:hover   { background: var(--tag-show-bg);  color: var(--tag-show-text);  border-color: var(--tag-show-text); }
    .filter-reg.active, .filter-reg:hover     { background: var(--tag-reg-bg);   color: var(--tag-reg-text);   border-color: var(--tag-reg-text); }
    .filter-btn:not(.filter-drone):not(.filter-show):not(.filter-reg).active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
    }

    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .feed-section { margin-bottom: 2.5rem; }

    .feed-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 0.5px solid var(--border);
    }

    .card {
      background: #fff;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: var(--border-strong); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.4rem;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.45;
      flex: 1;
    }

    .card-title a {
      color: inherit;
      text-decoration: none;
    }

    .card-title a:hover { color: var(--accent); }

    .card-date {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      padding-top: 2px;
    }

    .card-snippet {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 0.6rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .source-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      padding: 1px 7px;
      color: rgba(255,255,255,0.8);
    }

    .topic-tag {
      font-size: 11px;
      border-radius: 4px;
      padding: 1px 7px;
    }

    .topic-drone { background: var(--tag-drone-bg); color: var(--tag-drone-text); }
    .topic-show  { background: var(--tag-show-bg);  color: var(--tag-show-text); }
    .topic-reg   { background: var(--tag-reg-bg);   color: var(--tag-reg-text); }

    .error-banner {
      background: #fcebeb;
      border: 0.5px solid #f09595;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: 14px;
      color: #791f1f;
      margin-bottom: 1rem;
    }

    @media (prefers-color-scheme: dark) {
      .error-banner { background: #501313; border-color: #a32d2d; color: #f7c1c1; }
    }

    .empty { padding: 2rem 0; text-align: center; color: var(--text-muted); font-size: 14px; }
  
    /* ── Galaxy background for mobile ── */
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    @media (max-width: 768px) {
      body {
        background: #0a0a1a !important;
      }
      body::before {
        background: none !important;
      }
      #galaxy-canvas {
        display: block;
      }
    }

    @media (min-width: 769px) {
      #galaxy-canvas { display: none; }
    }

    #galaxy-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

  </style>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>
<header style="background:rgba(255,255,255,0.55);backdrop-filter:blur(10px);border-radius:14px;max-width:820px;margin:1rem auto 0;">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--accent);text-decoration:none;margin-bottom:1rem;border:0.5px solid var(--accent);border-radius:6px;padding:4px 10px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">
    ← Back to PQ Robotics
  </a>
  <p class="header-eyebrow">Atlanta · Live Feed</p>
  <h1>Drone News</h1>
  <div class="header-meta">
    <span id="last-updated">Loading…</span>
    <span class="dot">·</span>
    <span id="article-count">—</span>
    <button class="refresh-btn" onclick="loadFeeds()">↻ Refresh</button>
  </div>
</header>

<div class="feed-panel" style="margin-top:1.5rem;"><div class="controls" style="max-width:100%;padding:0.5rem 0.75rem 0;">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn filter-drone" onclick="setFilter('drone', this)">Drone events</button>
  <button class="filter-btn filter-show" onclick="setFilter('show', this)">Drone shows</button>
  <button class="filter-btn filter-reg" onclick="setFilter('reg', this)">Regulations</button>
</div>

<main>
  <div id="content">
    <div class="status"><span class="spinner"></span> Fetching feeds…</div>
  </div>
</main></div>

<script>
  /* feeds are served from feed-cache.json, built hourly by GitHub Actions */

  let allItems = [];
  let activeFilter = "all";

  function tagItem(title, snippet) {
    const text = (title + " " + snippet).toLowerCase();
    if (/\bshow\b|light show|display|spectacle/.test(text)) return "show";
    if (/regulat|faa|airspace|permit|law|ban|ordinance|policy/.test(text)) return "reg";
    return "drone";
  }

  function formatDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function stripHtml(html) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || "";
  }

  function topicLabel(tag) {
    return { drone: "Drone event", show: "Drone show", reg: "Regulations" }[tag] || "Drone";
  }

  function render() {
    const filtered = activeFilter === "all"
      ? allItems
      : allItems.filter(i => i.tag === activeFilter);

    const el = document.getElementById("content");

    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty">No articles found for this filter.</div>';
      return;
    }

    const grouped = {};
    filtered.forEach(item => {
      if (!grouped[item.feedLabel]) grouped[item.feedLabel] = [];
      grouped[item.feedLabel].push(item);
    });

    let html = "";
    for (const [label, items] of Object.entries(grouped)) {
      html += `<div class="feed-section">
        <p class="feed-label">${label}</p>`;
      items.forEach(item => {
        const snippet = item.description ? stripHtml(item.description).slice(0, 200) : "";
        html += `
        <div class="card">
          <div class="card-top">
            <p class="card-title"><a href="${item.link}" target="_blank" rel="noopener">${item.title}</a></p>
            <span class="card-date">${formatDate(item.pubDate)}</span>
          </div>
          ${snippet ? `<p class="card-snippet">${snippet}…</p>` : ""}
          <div class="card-footer">
            ${item.source ? `<span class="source-tag">${item.source}</span>` : ""}
            <span class="topic-tag topic-${item.tag}">${topicLabel(item.tag)}</span>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    el.innerHTML = html;

    document.getElementById("article-count").textContent =
      `${filtered.length} article${filtered.length !== 1 ? "s" : ""}`;
  }

  async function loadFeeds() {
    document.getElementById("content").innerHTML =
      '<div class="status"><span class="spinner"></span> Loading news…</div>';
    document.getElementById("last-updated").textContent = "Loading…";
    allItems = [];

    let data;
    try {
      const res = await fetch("feed-cache.json?t=" + Date.now());
      data = await res.json();
    } catch(e) {
      document.getElementById("content").innerHTML =
        '<div class="error-banner">⚠️ Could not load feed-cache.json. Make sure the GitHub Action has run at least once.</div>';
      return;
    }

    (data.items || []).forEach(item => {
      allItems.push({
        ...item,
        tag: tagItem(item.title || "", item.description || ""),
      });
    });

    const updated = data.updated
      ? new Date(data.updated).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" })
      : "unknown";
    document.getElementById("last-updated").textContent = "Updated " + updated;

    const el = document.getElementById("content");
    let errorHtml = (data.errors || []).map(e => `<div class="error-banner">⚠️ ${e}</div>`).join("");
    el.innerHTML = errorHtml;

    document.getElementById("article-count").textContent =
      `${allItems.length} article${allItems.length !== 1 ? "s" : ""}`;

    if (allItems.length === 0 && (data.errors || []).length === 0) {
      el.innerHTML += '<div class="empty">No articles yet — the GitHub Action may still be running for the first time.</div>';
    }

    render();
  }

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  }


  // Galaxy canvas for mobile
  (function() {
    const canvas = document.getElementById('galaxy-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < 220; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.3,
          speed: Math.random() * 0.004 + 0.001,
          offset: Math.random() * Math.PI * 2,
        });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const alpha = 0.2 + 0.8 * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.offset));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    resize();
    initStars();
    window.addEventListener('resize', () => { resize(); initStars(); });
    requestAnimationFrame(draw);
  })();

  loadFeeds();
  setInterval(loadFeeds, 30 * 60 * 1000);
</script>
</body>
</html>
