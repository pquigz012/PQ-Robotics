<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream · PQ Robotics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎥</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #07090f;
      --bg-card:    #111827;
      --border:     rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.12);
      --accent:     #3a7bd5;
      --accent-dim: rgba(58,123,213,0.12);
      --accent-glow:rgba(58,123,213,0.25);
      --text-primary:   #e8eaf0;
      --text-secondary: #8a9ab5;
      --live-red: #ef4444;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      background-image:
        linear-gradient(rgba(58,123,213,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58,123,213,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: rgba(7,9,15,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .latency-badge {
      font-size: 11px;
      font-family: var(--font-display);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .latency-dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .sign-out {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }
    .sign-out:hover { color: var(--text-primary); }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--live-red);
    }

    .live-pill-dot {
      width: 6px;
      height: 6px;
      background: var(--live-red);
      border-radius: 50%;
      animation: pulse-red 1.2s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Stream area ── */
    .stream-grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.5rem;
    }

    .stream-player {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stream-placeholder {
      text-align: center;
      padding: 2rem;
    }

    .stream-placeholder svg {
      opacity: 0.2;
      margin-bottom: 1rem;
    }

    .stream-placeholder h2 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .stream-placeholder p {
      font-size: 13px;
      color: var(--text-secondary);
      opacity: 0.6;
      line-height: 1.5;
    }

    /* Scanning line animation for placeholder */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 3s linear infinite;
      opacity: 0.4;
    }

    @keyframes scan {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    /* ── Sidebar ── */
    .sidebar { display: flex; flex-direction: column; gap: 1rem; }

    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      padding: 1.25rem;
    }

    .info-card-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--text-secondary); }
    .stat-value { font-weight: 500; font-family: var(--font-display); }
    .stat-value.green { color: #22c55e; }
    .stat-value.yellow { color: #facc15; }

    .cosmo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(58,123,213,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 0.75rem;
    }
    .cosmo-badge svg { color: var(--accent); flex-shrink: 0; }

    @media (max-width: 768px) {
      .stream-grid { grid-template-columns: 1fr; }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">PQ <span>ROBOTICS</span></a>
  <div class="nav-right">
    <div class="latency-badge">
      <span class="latency-dot"></span>
      ~200–600ms latency
    </div>
    <a href="login.html" class="sign-out">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-title">
      Drone Live Feed
      <span class="live-pill"><span class="live-pill-dot"></span> LIVE</span>
    </div>
  </div>

  <div class="stream-grid">

    <!-- Player -->
    <div class="stream-player">
      <div class="scan-line"></div>
      <iframe
        src="https://customer-er1i035n4bgch658.cloudflarestream.com/99926d2eb229af86e1a56cc0787fae76/iframe"
        style="border:none;position:absolute;top:0;left:0;height:100%;width:100%;"
        allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
        allowfullscreen="true">
      </iframe>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">

      <div class="info-card">
        <p class="info-card-title">Stream Status</p>
        <div class="stat-row">
          <span class="stat-label">Connection</span>
          <span class="stat-value green">Cloudflare Stream</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Latency</span>
          <span class="stat-value" id="stat-latency">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Protocol</span>
          <span class="stat-value">WebRTC (WHEP)</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Resolution</span>
          <span class="stat-value" id="stat-resolution">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Bitrate</span>
          <span class="stat-value" id="stat-bitrate">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Frame rate</span>
          <span class="stat-value" id="stat-fps">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Viewer</span>
          <span class="stat-value green">Authenticated</span>
        </div>
      </div>

      <div class="info-card">
        <p class="info-card-title">Drone Info</p>
        <div class="stat-row">
          <span class="stat-label">Unit</span>
          <span class="stat-value">PQ-01</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Location</span>
          <span class="stat-value">Atlanta, GA</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Status</span>
          <span class="stat-value yellow">Standby</span>
        </div>
      </div>

      <div class="info-card">
        <p class="info-card-title">Provider</p>
        <div class="cosmo-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          Powered by CosmoStreaming
        </div>
      </div>

    </div>
  </div>
</main>


<script>
  // Cloudflare Stream WebRTC (WHEP) playback
  const WHEP_URL = "https://customer-er1i035n4bgch658.cloudflarestream.com/99926d2eb229af86e1a56cc0787fae76/webRTC/play";

  // Live stats polling
  let pc_ref = null;
  let lastBytes = 0;
  let lastStatsTime = 0;

  async function pollStats() {
    if (!pc_ref) return;
    const stats = await pc_ref.getStats();
    stats.forEach(report => {
      if (report.type === 'inbound-rtp' && report.kind === 'video') {
        // Resolution
        if (report.frameWidth && report.frameHeight) {
          document.getElementById('stat-resolution').textContent =
            `${report.frameWidth}×${report.frameHeight}`;
        }
        // FPS
        if (report.framesPerSecond) {
          document.getElementById('stat-fps').textContent =
            `${Math.round(report.framesPerSecond)} fps`;
        }
        // Bitrate
        const now = Date.now();
        if (lastStatsTime && report.bytesReceived) {
          const elapsed = (now - lastStatsTime) / 1000;
          const bitsPerSec = ((report.bytesReceived - lastBytes) * 8) / elapsed;
          const mbps = (bitsPerSec / 1_000_000).toFixed(2);
          document.getElementById('stat-bitrate').textContent = `${mbps} Mbps`;
        }
        lastBytes = report.bytesReceived || lastBytes;
        lastStatsTime = now;
      }
      // Latency via round-trip time
      if (report.type === 'candidate-pair' && report.state === 'succeeded' && report.currentRoundTripTime !== undefined) {
        const ms = Math.round(report.currentRoundTripTime * 1000);
        document.getElementById('stat-latency').textContent = `${ms} ms`;
      }
    });
  }

  async function startWebRTC() {
    const video = document.getElementById('stream-video');
    const offline = document.getElementById('stream-offline');

    const pc = new RTCPeerConnection();
    pc_ref = pc;
    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    pc.ontrack = e => {
      if (e.track.kind === 'video') {
        video.srcObject = e.streams[0];
        offline.style.display = 'none';
        video.style.display = 'block';
        document.getElementById('stream-status').textContent = 'Live';
        document.getElementById('stream-status').className = 'stat-value green';
        setInterval(pollStats, 1000);
      }
    };

    pc.oniceconnectionstatechange = () => {
      if (['disconnected','failed','closed'].includes(pc.iceConnectionState)) {
        video.style.display = 'none';
        offline.style.display = 'flex';
        document.getElementById('stream-status').textContent = 'Offline';
        document.getElementById('stream-status').className = 'stat-value yellow';
        ['stat-latency','stat-resolution','stat-bitrate','stat-fps'].forEach(id => {
          document.getElementById(id).textContent = '—';
        });
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const res = await fetch(WHEP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/sdp' },
      body: offer.sdp
    });

    if (res.ok) {
      const answer = await res.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answer });
    } else {
      offline.style.display = 'flex';
    }
  }

  startWebRTC();
</script>
</body>
</html>
