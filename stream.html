<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream · PQ Robotics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎥</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #07090f;
      --bg-card:    #111827;
      --border:     rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.12);
      --accent:     #3a7bd5;
      --accent-dim: rgba(58,123,213,0.12);
      --accent-glow:rgba(58,123,213,0.25);
      --text-primary:   #e8eaf0;
      --text-secondary: #8a9ab5;
      --live-red: #ef4444;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      background-image:
        linear-gradient(rgba(58,123,213,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58,123,213,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: rgba(7,9,15,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .latency-badge {
      font-size: 11px;
      font-family: var(--font-display);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .latency-dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .sign-out {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }
    .sign-out:hover { color: var(--text-primary); }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--live-red);
    }

    .live-pill-dot {
      width: 6px;
      height: 6px;
      background: var(--live-red);
      border-radius: 50%;
      animation: pulse-red 1.2s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Stream area ── */
    .stream-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .stream-player {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stream-placeholder {
      text-align: center;
      padding: 2rem;
    }

    .stream-placeholder svg {
      opacity: 0.2;
      margin-bottom: 1rem;
    }

    .stream-placeholder h2 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .stream-placeholder p {
      font-size: 13px;
      color: var(--text-secondary);
      opacity: 0.6;
      line-height: 1.5;
    }

    /* Scanning line animation for placeholder */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 3s linear infinite;
      opacity: 0.4;
    }

    @keyframes scan {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    /* ── Details strip (below player) ── */
    .details-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      overflow: hidden;
    }

    .detail-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding: 0.9rem 1.25rem;
      border-right: 1px solid var(--border);
    }
    .detail-group:last-child { border-right: none; }
    .detail-group.grow { flex: 1; }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      white-space: nowrap;
    }
    .detail-item .stat-label { color: var(--text-secondary); }
    .detail-item .stat-value { font-weight: 500; font-family: var(--font-display); }
    .stat-value.green { color: #22c55e; }
    .stat-value.yellow { color: #facc15; }

    .powered-by {
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.55;
      text-align: right;
      margin-top: -0.75rem;
    }

    @media (max-width: 900px) {
      .details-strip { flex-direction: column; }
      .detail-group { border-right: none; border-bottom: 1px solid var(--border); }
      .detail-group:last-child { border-bottom: none; }
    }

    @media (max-width: 768px) {
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">PQ <span>ROBOTICS</span></a>
  <div class="nav-right">
    <div class="latency-badge">
      <span class="latency-dot"></span>
      Low-latency HLS
    </div>
    <a href="login.html" class="sign-out">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-title">
      Drone Live Feed
      <span class="live-pill"><span class="live-pill-dot"></span> LIVE</span>
    </div>
  </div>

  <div class="stream-grid">

    <!-- Player -->
    <div class="stream-player">
      <div class="scan-line"></div>
      <iframe
        src="https://customer-er1i035n4bgch658.cloudflarestream.com/99926d2eb229af86e1a56cc0787fae76/iframe"
        style="border:none;position:absolute;top:0;left:0;height:100%;width:100%;"
        allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
        allowfullscreen="true">
      </iframe>
    </div>

    <!-- Details -->
    <p class="powered-by">Powered by CosmoStreaming</p>

    <div class="details-strip">

      <div class="detail-group grow">
        <div class="detail-item">
          <span class="stat-label">Connection</span>
          <span class="stat-value green">Cloudflare Stream</span>
        </div>
        <div class="detail-item">
          <span class="stat-label">Playback</span>
          <span class="stat-value" id="stat-live">Connecting…</span>
        </div>
        <div class="detail-item">
          <span class="stat-label">Protocol</span>
          <span class="stat-value">HLS (Low-Latency)</span>
        </div>
        <div class="detail-item">
          <span class="stat-label">Resolution</span>
          <span class="stat-value" id="stat-resolution">—</span>
        </div>
        <div class="detail-item">
          <span class="stat-label">Viewer</span>
          <span class="stat-value green">Authenticated</span>
        </div>
      </div>

      <div class="detail-group">
        <div class="detail-item">
          <span class="stat-label">Unit</span>
          <span class="stat-value">PQ-01</span>
        </div>
        <div class="detail-item">
          <span class="stat-label">Location</span>
          <span class="stat-value">Atlanta, GA</span>
        </div>
        <div class="detail-item">
          <span class="stat-label">Status</span>
          <span class="stat-value yellow">Standby</span>
        </div>
      </div>

    </div>
  </div>
</main>


<script src="https://embed.cloudflarestream.com/embed/sdk.latest.js"></script>
<script>
  // Wire the sidebar stats to the REAL player — the iframe that's already
  // rendering your video via Cloudflare's Stream Player (LL-HLS under the hood).
  // No separate WebRTC/WHEP connection is opened here, because Cosmostreamer
  // publishes via RTMPS, not WHIP — this just reads the state of the player
  // that's actually delivering your video.

  const iframe = document.querySelector('.stream-player iframe');
  const player = Stream(iframe);

  const liveEl = document.getElementById('stat-live');
  const resEl  = document.getElementById('stat-resolution');

  function setLive(isLive) {
    liveEl.textContent = isLive ? 'Live' : 'Offline';
    liveEl.className = 'stat-value ' + (isLive ? 'green' : 'yellow');
  }

  player.addEventListener('playing', () => {
    setLive(true);
    if (player.videoWidth && player.videoHeight) {
      resEl.textContent = `${player.videoWidth}×${player.videoHeight}`;
    }
  });

  player.addEventListener('resize', () => {
    if (player.videoWidth && player.videoHeight) {
      resEl.textContent = `${player.videoWidth}×${player.videoHeight}`;
    }
  });

  // These are Cloudflare Stream Player-specific events that fire when the
  // underlying live input actually starts/stops broadcasting.
  player.addEventListener('stream-live', () => setLive(true));
  player.addEventListener('stream-offline', () => {
    setLive(false);
    resEl.textContent = '—';
  });

  player.addEventListener('error', () => setLive(false));
</script>
</body>
</html>
