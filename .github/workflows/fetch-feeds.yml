name: Fetch Drone News Feeds

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and merge RSS feeds
        run: python3 fetch_feeds.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-cache.json
          git diff --cached --quiet || (git commit -m "chore: update drone news feed cache" && git pull --rebase && git push)
