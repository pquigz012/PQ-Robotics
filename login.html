<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Sign-in · PQ Robotics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #07090f;
      --bg-card:    #111827;
      --border:     rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.12);
      --accent:     #3a7bd5;
      --accent-dim: rgba(58,123,213,0.12);
      --accent-glow:rgba(58,123,213,0.25);
      --text-primary:   #e8eaf0;
      --text-secondary: #8a9ab5;
      --error: #f87171;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;

      /* grid overlay same as main site */
      background-image:
        linear-gradient(rgba(58,123,213,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58,123,213,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: rgba(7,9,15,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    .nav-back {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text-primary); }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    /* ── Shield icon header ── */
    .shield-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .shield-icon {
      width: 56px;
      height: 56px;
      background: var(--accent-dim);
      border: 1px solid rgba(58,123,213,0.3);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      box-shadow: 0 0 28px var(--accent-glow);
    }

    .shield-header h1 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
    }

    .shield-header p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── Card ── */
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 16px;
      padding: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: var(--font-body);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--text-secondary); opacity: 0.6; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .forgot {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .forgot:hover { opacity: 1; }

    .btn-signin {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-display);
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1.5rem;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px var(--accent-glow);
    }

    .btn-signin:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .btn-signin:active { transform: translateY(0); }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--text-secondary);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-mid);
    }

    /* ── Security note ── */
    .security-note {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(58,123,213,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 1.25rem;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .security-note svg { flex-shrink: 0; color: var(--accent); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .login-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">PQ <span>ROBOTICS</span></a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to site
  </a>
</nav>

<main>
  <div class="login-wrap">

    <div class="shield-header">
      <div class="shield-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#3a7bd5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1>Secure Sign-in</h1>
      <p>Access your PQ Robotics client portal</p>
    </div>

    <div class="login-card">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-signin" onclick="handleLogin()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Sign in
      </button>

      <div class="security-note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        This portal is for authorized PQ Robotics clients only. All sessions are encrypted and monitored.
      </div>
    </div>

  </div>
</main>

<footer>© 2026 PQ Robotics · Atlanta, GA</footer>

<script>
  function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) {
      alert('Please enter your email and password.');
      return;
    }
    window.location.href = 'stream.html';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
